name: Update firmware data

on:
  schedule:
    # Sundays at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'How to apply changes'
        required: true
        default: 'direct'
        type: choice
        options:
          - direct
          - pr

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run updater
        id: run
        run: node scripts/update-products.js

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- src/data/products.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # main is protected by a ruleset requiring all changes go through a PR,
      # so the bot can no longer push directly. Every run opens (or updates) a
      # PR instead. Scheduled runs (and `mode: direct`) then enable auto-merge
      # so the data still lands hands-off; `mode: pr` leaves it for review.
      - name: Open pull request
        id: cpr
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: firmware data update $(date -u +%Y-%m-%d)"
          title: "chore: firmware data update"
          body: |
            Automated firmware version refresh from docs.fortinet.com.

            Review the diff in `src/data/products.json` before merging.
          branch: bot/firmware-update
          base: main
          delete-branch: true

      - name: Enable auto-merge
        if: >-
          steps.cpr.outputs.pull-request-number != '' &&
          (github.event_name == 'schedule' || github.event.inputs.mode == 'direct')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          # Prefer auto-merge (waits for any required checks); fall back to an
          # immediate merge if the repo's "Allow auto-merge" setting is off.
          gh pr merge "$PR" --squash --auto --delete-branch \
            || gh pr merge "$PR" --squash --delete-branch
